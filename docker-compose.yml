version: '3.8'

services:
  berghain-haproxy:
    build: .
    ports:
      - "8080:8080" # Expose the backend service
    environment:
      - BERGHAIN_LOG_HMAC_KEY=change-me-in-production
    volumes:
      - ./examples/haproxy/haproxy.cfg:/app/haproxy.cfg
      - ./examples/haproxy/berghain.cfg:/app/examples/haproxy/berghain.cfg
      - ./examples/haproxy/errors:/app/examples/haproxy/errors
      - ./cmd/spop/config.yaml:/app/config.yaml
      # maps/ is NOT mounted: feedupdater regenerates cloudflare-ips.lst in the
      # container, and the static maps come from the image.
    command: sh -c "haproxy -f haproxy.cfg -L haproxy_local & ./feedupdater -peer-listen 127.0.0.1:10001 -maps-dir examples/haproxy/maps -interval 6h & ./berghain -config config.yaml"
