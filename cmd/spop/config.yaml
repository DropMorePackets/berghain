# Optional embedded IP reputation: serve CrowdSec decisions and static feeds
# to HAProxy over the peers protocol from this same process. See
# examples/haproxy/haproxy-reputation.cfg for the matching HAProxy side.
#reputation:
#  peer_listen: 0.0.0.0:10001    # must match this peer's entry in the peers section
#  local_peer: berghain_feed     # our name in the peers section
#  crowdsec:
#    url: http://crowdsec:8080   # LAPI; api_key via CROWDSEC_API_KEY or api_key:
#  maps_dir: examples/haproxy/maps  # where CIDR feeds land; empty disables them

default:
  levels:
    - duration: 24h
      type: none
    - duration: 30m
      type: pow

frontend:
  my_fancy_frontend:
    # normally, the exact host is stored and examined during cookie validation
    # to allow a domain including all of its subdomains to share a validated session, list it here
    trusted_domains:
      - foo.example.com
    levels:
      - duration: 30s
        type: none
        countdown: 9  # default is 3 seconds, maximum is 9
      - duration: 20s
        type: pow
      - duration: 10s
        type: pow
        countdown: 0
      # captcha levels (turnstile, hcaptcha, recaptcha) verify the widget
      # token against the provider, so the agent needs outbound HTTPS access
      - duration: 12h
        type: turnstile
        sitekey: 1x00000000000000000000AA               # dummy sitekey, always passes
        secret: 1x0000000000000000000000000000000AA     # dummy secret, always passes
