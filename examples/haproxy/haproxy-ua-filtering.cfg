# Example: User-Agent + endpoint based filtering (Anubis-style policy).
#
# This is an ALTERNATIVE to the default examples/haproxy/haproxy.cfg. Instead of
# challenging on request rate, it decides who gets a challenge purely from the
# User-Agent and the request path:
#
#   * Known AI crawlers            -> always challenged
#   * Clients claiming to be a     -> challenged
#     normal browser (Mozilla/...)
#   * Honest tools / feed readers  -> allowed through (curl, RSS/Atom readers, ...)
#     (allow_ua.map) and feed/API endpoints
#
# Note this is the opposite stance to the default config's tarpit (which blocks
# curl and library clients). Choose the policy that fits your service: an API /
# RSS provider wants to let tools through; a scrape-averse frontend does not.
#
# Validate with:  haproxy -c -f examples/haproxy/haproxy-ua-filtering.cfg

global
    log stdout format raw local0
    # The inlined challenge page can exceed HAProxy's default 16k buffer.
    tune.bufsize 32768

defaults
    mode http
    log global
    timeout client 5s
    timeout server 5s
    timeout connect 5s
    option httplog

frontend test
    bind *:8080

    acl berghain_path path /cdn-cgi/challenge-platform/challenge

    # --- Classify the client ---
    # Known AI crawlers (substring match on the lowercased UA).
    http-request set-var(txn.ai) req.hdr(User-Agent),lower,map_sub(examples/haproxy/maps/ai_crawlers.map,-)
    acl is_ai_crawler var(txn.ai) -m str 1

    # Honest tools / feed readers we deliberately allow through un-challenged.
    http-request set-var(txn.tool) req.hdr(User-Agent),lower,map_sub(examples/haproxy/maps/allow_ua.map,-)
    acl is_allowed_tool var(txn.tool) -m str 1

    # Feed / programmatic endpoints we allow through even for browser UAs.
    acl is_feed_path path_end .rss .atom .xml
    acl is_feed_path path_beg /feed /rss /api/

    # A "normal browser" advertises a Mozilla/ UA.
    acl claims_browser req.hdr(User-Agent) -m sub -i Mozilla/

    filter spoe engine berghain config examples/haproxy/berghain.cfg

    # --- Decide who is challenged (level 2 = pow in the default config) ---
    # Allowed tools and feed/API endpoints are never challenged (level stays unset).
    http-request set-var(req.berghain.level) int(2) if is_ai_crawler !is_allowed_tool !is_feed_path
    http-request set-var(req.berghain.level) int(2) if claims_browser !is_allowed_tool !is_feed_path

    acl berghain_active var(req.berghain.level) -m found

    http-request send-spoe-group berghain validate if !berghain_path berghain_active
    http-request return status 501 if { var(txn.berghain.error) -m found }

    acl berghain_valid var(txn.berghain.valid) -m bool
    acl is_ssl ssl_fc

    http-request return status 403 content-type "text/html" file "web/dist/default/index.html" if !berghain_valid !berghain_path berghain_active !is_ssl
    http-request return status 403 content-type "text/html" file "web/dist/native-crypto/index.html" if !berghain_valid !berghain_path berghain_active is_ssl
    http-request wait-for-body time 5s if berghain_path METH_POST
    use_backend berghain_http if berghain_path

    default_backend app_backend

backend app_backend
    mode http
    http-request return status 200 content-type "text/plain" string "Hello World!"

backend berghain_http
    mode http
    filter spoe engine berghain config examples/haproxy/berghain.cfg

    acl is_challenge_path path /cdn-cgi/challenge-platform/challenge

    http-request send-spoe-group berghain challenge if is_challenge_path
    http-request return status 501 if { var(txn.berghain.error) -m found }

    acl has_token var(txn.berghain.token) -m found

    http-after-response add-header set-cookie "berghain=%[var(txn.berghain.token)]; %[var(txn.berghain.domain)] path=/;" if has_token
    http-request return status 200 content-type "application/json" lf-string "%[var(txn.berghain.response)]" if is_challenge_path

    http-request return status 404

backend berghain_spop
    mode tcp
    option spop-check
    server localhost unix@./spop.sock check
