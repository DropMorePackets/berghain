global
    log stdout format raw local0

    # The inlined challenge page can exceed HAProxy's default 16k buffer, so the
    # `http-request return ... file` directives below need a larger buffer.
    tune.bufsize 32768

    # Runtime API socket. The Phase 3 feed updater pushes map deltas here so
    # blocklists refresh without a reload. In production prefer a fixed path
    # such as /var/run/haproxy/admin.sock.
    stats socket /tmp/haproxy-admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s

    # Keyed HMAC secret used to hash client IPs in logs (Feature 7). Override
    # BERGHAIN_LOG_HMAC_KEY in production; the default here is for local runs only.
    set-var proc.log_key str("${BERGHAIN_LOG_HMAC_KEY-berghain-dev-log-key}")

defaults
    mode http
    log global
    timeout client 5s
    timeout server 5s
    timeout connect 5s
    timeout tarpit 30s
    option httplog

listen stats
    bind 127.0.0.1:8000
    stats enable
    stats uri /
    stats refresh 15s

frontend test
    bind *:8080

    # (a) Global cap on new sessions per second across the whole frontend.
    maxconn 20000
    rate-limit sessions 5000

    acl berghain_path path /cdn-cgi/challenge-platform/challenge

    # --- Privacy: log a keyed hash of the client IP, never the plaintext value ---
    # The IP is salted with a secret key before hashing so the digest cannot be
    # reversed via a rainbow table (an unkeyed sha2 of an IPv4 trivially can be).
    http-request set-var(txn.src_hash) src,concat(,proc.log_key,),sha2(256),hex
    http-request set-var(txn.bh_session) req.hdr(X-Berghain-Session)
    log-format "%[var(txn.src_hash)]\ [%t]\ %ft\ %b/%s\ %ST\ %B\ %tsc\ bh:%[var(txn.bh_session)]\ %{+Q}r\ spoa-error:\ %[var(txn.berghain.error)]"

    # (b) Per-IP burst limiter (sc0): >30 req/s in a 1s window -> 429.
    #     The challenge endpoint is exempt so solving a challenge is never throttled.
    http-request track-sc0 src table st_burst
    http-request return status 429 content-type "application/json" lf-string "{\"error\":\"rate_limited\"}" hdr "Retry-After" "1" if { sc0_http_req_rate(st_burst) gt 30 } !berghain_path

    # --- Network reputation / hidden-service bypass (Phase 3) ---
    # A .onion/.i2p request must NOT set the level var at all: setting even 0
    # makes berghain_active true and would wrongly serve a challenge. So every
    # level rule below is guarded with !is_hidden_service; a hidden-service
    # request leaves the var unset and passes straight through.
    # regsub strips a trailing :port so foo.onion:8080 still matches (see issue #46).
    acl is_hidden_service req.hdr(Host),regsub(:[0-9]+$,) -m end .onion .i2p

    # Reputation / ASN lookups (map files refreshed out-of-band by cmd/feedupdater).
    http-request set-var(req.rep) src,map_ip(examples/haproxy/maps/reputation.map,pass) if !is_hidden_service
    http-request set-var(req.asn) src,map_ip(examples/haproxy/maps/asn.map,0) if !is_hidden_service
    http-request set-var(req.asn_action) var(req.asn),map_str(examples/haproxy/maps/asn_action.map,pass) if !is_hidden_service

    # Hard blocks (silent-drop): the whole Cloudflare ASN, the banlist, and
    # reputation/ASN entries marked "block".
    http-request silent-drop if !is_hidden_service { src -f examples/haproxy/maps/cloudflare-ips.lst }
    http-request silent-drop if !is_hidden_service { src,map_ip(examples/haproxy/maps/ban.map) -m found }
    http-request silent-drop if !is_hidden_service { var(req.rep) -m str block }
    http-request silent-drop if !is_hidden_service { var(req.asn_action) -m str block }

    # Base challenge level from request rate (sc1); rules are increasing so the highest wins.
    http-request track-sc1 src table st_src
    http-request set-var(req.berghain.level) int(1) if !is_hidden_service { sc1_http_req_rate(st_src) gt 5 }
    http-request set-var(req.berghain.level) int(2) if !is_hidden_service { sc1_http_req_rate(st_src) gt 10 }
    http-request set-var(req.berghain.level) int(3) if !is_hidden_service { sc1_http_req_rate(st_src) gt 15 }

    # Flagged networks raise the minimum level (only ever upward, via the lt guard):
    # reputation score, abusive/datacenter ASN, VPN exit, or Tor exit (clearnet).
    http-request set-var(req.berghain.level) int(2) if !is_hidden_service { var(req.rep) -m int ge 2 } !{ var(req.berghain.level) -m int ge 2 }
    http-request set-var(req.berghain.level) int(3) if !is_hidden_service { var(req.rep) -m int ge 3 } !{ var(req.berghain.level) -m int ge 3 }
    http-request set-var(req.berghain.level) int(2) if !is_hidden_service { var(req.asn_action) -m str challenge } !{ var(req.berghain.level) -m int ge 2 }
    http-request set-var(req.berghain.level) int(2) if !is_hidden_service { src,map_ip(examples/haproxy/maps/vpn.map) -m found } !{ var(req.berghain.level) -m int ge 2 }
    http-request set-var(req.berghain.level) int(3) if !is_hidden_service { src,map_ip(examples/haproxy/maps/tor_exit.map) -m found } !{ var(req.berghain.level) -m int ge 3 }

    # --- Ban enforcement (read via converters so it applies to every request) ---
    # Checked BEFORE tracking sc2 below, so a banned client's requests do not
    # refresh the ban entry's expiry and the countdown actually ticks down.
    acl is_banned src,table_gpt0(st_challenge) -m int gt 0
    http-request set-var(txn.ban_remaining) src,table_expire(st_challenge),div(1000) if is_banned
    http-request return status 429 content-type "application/json" lf-string "{\"t\":3,\"remaining\":%[var(txn.ban_remaining)]}" hdr "Retry-After" "%[var(txn.ban_remaining)]" hdr "X-Ban-Remaining" "%[var(txn.ban_remaining)]" if is_banned berghain_path
    http-request return status 429 content-type "text/html" lf-file "examples/haproxy/errors/banned.html" hdr "Retry-After" "%[var(txn.ban_remaining)]" if is_banned !berghain_path

    # (c) Sliding-window anti-bruteforce on the challenge endpoint (sc2).
    #     Too many challenge submissions -> set the ban flag (gpt0). This is a
    #     flat temporary ban (lifts when the st_challenge entry expires); true
    #     escalating/doubling durations come from CrowdSec in Phase 3.
    http-request track-sc2 src table st_challenge if berghain_path METH_POST
    acl too_many_challenges sc2_http_req_rate(st_challenge) gt 10
    http-request sc-set-gpt0(2) 1 if too_many_challenges

    # --- User-Agent blocking + AI/scraper tarpit (Feature 5) ---
    http-request set-var(txn.ua_bad) req.hdr(User-Agent),lower,map_sub(examples/haproxy/maps/bad_ua.map,-)
    acl lib_ua var(txn.ua_bad) -m str 1
    http-request tarpit deny_status 429 if lib_ua !berghain_path

    filter spoe engine berghain config examples/haproxy/berghain.cfg

    acl berghain_active var(req.berghain.level) -m found

    http-request send-spoe-group berghain validate if !berghain_path berghain_active
    http-request return status 501 if { var(txn.berghain.error) -m found }

    acl berghain_valid var(txn.berghain.valid) -m bool
    acl is_ssl ssl_fc

    http-request return status 403 content-type "text/html" file "web/dist/default/index.html" if !berghain_valid !berghain_path berghain_active !is_ssl
    http-request return status 403 content-type "text/html" file "web/dist/native-crypto/index.html" if !berghain_valid !berghain_path berghain_active is_ssl
    http-request wait-for-body time 5s if berghain_path METH_POST
    use_backend berghain_http if berghain_path

    default_backend app_backend

backend st_src
    stick-table type ipv6 size 1m expire 15m store http_req_rate(10s)

backend st_burst
    stick-table type ipv6 size 1m expire 60s store http_req_rate(1s)

backend st_challenge
    # http_req_rate feeds the anti-bruteforce window; gpt0 is the ban flag.
    # expire bounds the flat ban window (10m of inactivity clears it).
    stick-table type ipv6 size 1m expire 10m store http_req_rate(60s),gpt0

backend app_backend
    mode http
    http-request return status 200 content-type "text/plain" string "Hello World!"

backend berghain_http
    mode http
    filter spoe engine berghain config examples/haproxy/berghain.cfg

    acl is_challenge_path path /cdn-cgi/challenge-platform/challenge

    http-request send-spoe-group berghain challenge if is_challenge_path
    http-request return status 501 if { var(txn.berghain.error) -m found }

    acl has_token var(txn.berghain.token) -m found

    http-after-response add-header set-cookie "berghain=%[var(txn.berghain.token)]; %[var(txn.berghain.domain)] path=/;" if has_token
    http-request return status 200 content-type "application/json" lf-string "%[var(txn.berghain.response)]" if is_challenge_path

    http-request return status 404

backend berghain_spop
    mode tcp
    option spop-check
    server localhost unix@./spop.sock check
